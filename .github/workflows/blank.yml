name: AWS OIDC Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# MUST HAVE THIS PERMISSION BLOCK
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  DeployToAWS:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::221789841520:role/github-oidc # Paste your Role ARN here
          aws-region: ap-south-1 # Change to your target region

      - name: Log caller identity
        run: aws sts get-caller-identity

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (myuser/hello:latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: myuser/hello:latest

      - name: Install SonarScanner
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          SCANNER_VERSION=5.0.1.3006
          curl -sLo /tmp/sonar.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip"
          unzip /tmp/sonar.zip -d $HOME
          echo "SONAR_SCANNER_HOME=$HOME/sonar-scanner-${SCANNER_VERSION}-linux" >> $GITHUB_ENV
          echo "$HOME/sonar-scanner-${SCANNER_VERSION}-linux/bin" >> $GITHUB_PATH

      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_TOKEN" ]; then
            echo "Sonar credentials not provided; skipping scan." && exit 0
          fi
          sonar-scanner \
            -Dsonar.projectKey=hello-app \
            -Dsonar.sources=. \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"

      - name: Configure kubectl (EKS)
        env:
          CLUSTER_NAME: dev-eks-new
          AWS_REGION: ap-south-1
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Sync Argo CD applications
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
        run: |
          if [ -z "$ARGOCD_SERVER" ] || [ -z "$ARGOCD_USERNAME" ] || [ -z "$ARGOCD_PASSWORD" ]; then
            echo "Argo CD creds not provided; skipping sync." && exit 0
          fi
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          ./argocd login "$ARGOCD_SERVER" --username "$ARGOCD_USERNAME" --password "$ARGOCD_PASSWORD" --insecure
          ./argocd app sync monitoring || true
          ./argocd app sync loki-promtail || true
          ./argocd app sync grafana || true
          ./argocd app sync hello || true
