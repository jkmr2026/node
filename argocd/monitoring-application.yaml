apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.*
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: false
        prometheus:
          service:
            type: ClusterIP
        alertmanager:
          service:
            type: ClusterIP
